<!DOCTYPE html> 
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Brawl Calculator Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Bangers', cursive;
  background: radial-gradient(circle at top, #1da1ff, #0b3d91 70%);
  color:white;
}

/* 🔥 SOL ÜST MENÜ */
.menu {
  position: fixed;
  top: 15px;
  left: 15px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:10;
}

.menu button {
  font-family:'Bangers';
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background: linear-gradient(45deg, #ff3b3b, #ff9900);
  color:white;
  cursor:pointer;
  box-shadow:0 4px 0 #b32400;
}

.menu button:active {
  transform: translateY(3px);
  box-shadow:0 1px 0 #b32400;
}

/* 📱 TELEFON */
.phone {
  width: 700px;
  max-width: 95%;
  margin: 60px auto;
  border-radius: 40px;
  background: #111;
  padding: 20px;
  border: 6px solid #333;
  position: relative;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* dynamic island */
.phone::before {
  content:"";
  width:120px;
  height:25px;
  background:#000;
  border-radius:20px;
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
}

/* ekran içerik */
.screen {
  margin-top:30px;
}

/* kart */
.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:20px;
}

/* grid */
.level-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.level-box {
  background:#111;
  padding:10px;
  border-radius:10px;
}

input {
  width:70px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#ffcc00;
  text-align:center;
  font-family:'Bangers';
}

/* buton */
.calc-btn {
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:12px;
  background: linear-gradient(45deg, #00c3ff, #00ffcc);
  font-family:'Bangers';
  cursor:pointer;
}

/* sonuç */
.result {
  margin-top:10px;
  background:#000;
  padding:10px;
  border-radius:10px;
  border:2px solid gold;
}

/* sayfa gizleme */
.page {
  display:none;
}
.active {
  display:block;
}

/* 📱 TAM EKRAN MOBİL DÜZELTME */
@media(max-width:600px){

  body {
    height: 100vh;
    overflow:auto;
  }

  .phone {
    width: 100% !important;
    max-width: 100% !important;
    height: 100vh;
    margin: 0;
    border-radius: 0;
    border: none;
    padding: 15px;
  }

  .screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .card {
    flex:1;
  }

  .menu {
    top:10px;
    left:10px;
    transform: scale(0.9);
  }

  .level-grid{
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<!-- 🔥 MENÜ -->
<div class="menu">
  <button onclick="showPage('upgrade')">Savaşçı Yükseltme Hesaplayıcısı</button>
  <button onclick="showPage('gem')">Kostüm Fiyatı Hesaplayıcısı</button>
</div>

<!-- 📱 TELEFON -->
<div class="phone">
  <div class="screen">

    <!-- 🔥 UPGRADE -->
    <div id="upgrade" class="page active">
      <h2>Yükseltme</h2>
      <div class="card">
        <div class="level-grid" id="levels"></div>
        <button class="calc-btn" onclick="calculate()">HESAPLA</button>
        <div class="result" id="result">Sonuç burada</div>
      </div>
    </div>

    <!-- 💎 GEM -->
    <div id="gem" class="page">
      <h2>Kostümler</h2>
      <div class="card">

        <div class="level-box">
          Ender: <input type="number" id="rare" placeholder="0">
        </div>

        <div class="level-box">
          Süper Ender: <input type="number" id="superrare" placeholder="0">
        </div>

        <div class="level-box">
          Destansı: <input type="number" id="epic" placeholder="0">
        </div>

        <button class="calc-btn" onclick="calcGem()">HESAPLA</button>
        <div class="result" id="gemResult">Sonuç burada</div>

      </div>
    </div>

  </div>
</div>

<script>
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

const powerPoints = {
  1:20,2:30,3:50,4:80,5:130,
  6:210,7:340,8:550,9:890,10:1440
};

const goldCost = {
  1:20,2:35,3:75,4:140,5:290,
  6:480,7:800,8:1250,9:1875,10:2800
};

let container = document.getElementById("levels");

for (let lvl=1; lvl<=10; lvl++){
  let div=document.createElement("div");
  div.className="level-box";
  div.innerHTML=`Level ${lvl}<br>
  <input type="number" id="lvl${lvl}" placeholder="0">`;
  container.appendChild(div);
}

function calculate(){
  let totalPower=0;
  let totalGold=0;

  for (let lvl=1; lvl<=10; lvl++){
    let val=document.getElementById("lvl"+lvl).value;
    let count = val==="" ? 0 : parseInt(val);

    if(isNaN(count) || count<0){
      document.getElementById("result").innerHTML="⚠️ oops tekrar deneyin";
      return;
    }

    let power=0;
    let gold=0;

    for(let i=lvl;i<=10;i++){
      power+=powerPoints[i]||0;
      gold+=goldCost[i]||0;
    }

    totalPower+=power*count;
    totalGold+=gold*count;
  }

  document.getElementById("result").innerHTML=
  `⚡ Güç Puanı: ${totalPower}<br>💰 Altın: ${totalGold}`;
}

function calcGem(){
  let r = document.getElementById("rare").value || 0;
  let sr = document.getElementById("superrare").value || 0;
  let e = document.getElementById("epic").value || 0;

  r=parseInt(r); sr=parseInt(sr); e=parseInt(e);

  if(isNaN(r)||isNaN(sr)||isNaN(e)){
    document.getElementById("gemResult").innerHTML="⚠️ oops tekrar deneyin";
    return;
  }

  let totalGem = (r*29) + (sr*79) + (e*149);
  let totalPrice = (r*1000) + (sr*2750) + (e*5000);

  document.getElementById("gemResult").innerHTML=
  `💎 Toplam Elmas: ${totalGem}<br>🪙 Mücevher Fiyatı: ${totalPrice}`;
}
</script>

</body>
</html>
