<!DOCTYPE html> 
<html lang="tr">
<head>
<meta charset="UTF-8">

<!-- ❗ EN ÖNEMLİSİ (SENDE YOKTU / ÇALIŞMIYORDU) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brawl Pro Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:'Bangers', cursive;
  background: radial-gradient(circle at top, #1da1ff, #0b3d91 70%);
  color:white;
}

/* 🔥 MENÜ */
.menu {
  position: fixed;
  top: 10px;
  left: 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:10;
}

.menu button {
  font-family:'Bangers';
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg, #ff3b3b, #ff9900);
  color:white;
  cursor:pointer;
}

/* 📱 TELEFON */
.phone {
  width: 100%;
  height: 100vh; /* 🔥 TAM EKRAN */
  margin: 0;
  border-radius: 0;
  background: #111;
  padding: 15px;
  border: none;
  position: relative;
  box-sizing: border-box;
}

/* dynamic island */
.phone::before {
  content:"";
  width:100px;
  height:20px;
  background:#000;
  border-radius:20px;
  position:absolute;
  top:5px;
  left:50%;
  transform:translateX(-50%);
}

/* içerik */
.screen {
  margin-top:25px;
  height: calc(100vh - 40px);
  display:flex;
  flex-direction:column;
}

/* kart */
.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:20px;
  flex:1; /* 🔥 TAM DOLDUR */
  display:flex;
  flex-direction:column;
}

/* grid */
.level-grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  flex:1;
}

.level-box {
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

input {
  width:90%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#ffcc00;
  text-align:center;
  font-family:'Bangers';
}

/* buton */
.calc-btn {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background: linear-gradient(45deg, #00c3ff, #00ffcc);
  font-family:'Bangers';
  cursor:pointer;
}

/* sonuç */
.result {
  margin-top:10px;
  background:#000;
  padding:10px;
  border-radius:10px;
  border:2px solid gold;
}

/* sayfa */
.page { display:none; }
.active { display:block; }
</style>
</head>

<body>

<div class="menu">
  <button onclick="showPage('upgrade')">Savaşçı Yükseltme Hesaplayıcısı</button>
  <button onclick="showPage('gem')">Kostüm Fiyatı Hesaplayıcısı</button>
</div>

<div class="phone">
  <div class="screen">

    <div id="upgrade" class="page active">
      <h2>Yükseltme</h2>
      <div class="card">
        <div class="level-grid" id="levels"></div>
        <button class="calc-btn" onclick="calculate()">HESAPLA</button>
        <div class="result" id="result">Sonuç burada</div>
      </div>
    </div>

    <div id="gem" class="page">
      <h2>Kostümler</h2>
      <div class="card">

        <div class="level-box">
          Ender: <input type="number" id="rare" placeholder="0">
        </div>

        <div class="level-box">
          Süper Ender: <input type="number" id="superrare" placeholder="0">
        </div>

        <div class="level-box">
          Destansı: <input type="number" id="epic" placeholder="0">
        </div>

        <button class="calc-btn" onclick="calcGem()">HESAPLA</button>
        <div class="result" id="gemResult">Sonuç burada</div>

      </div>
    </div>

  </div>
</div>

<script>
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

const powerPoints = {
  1:20,2:30,3:50,4:80,5:130,
  6:210,7:340,8:550,9:890,10:1440
};

const goldCost = {
  1:20,2:35,3:75,4:140,5:290,
  6:480,7:800,8:1250,9:1875,10:2800
};

let container = document.getElementById("levels");

for (let lvl=1; lvl<=10; lvl++){
  let div=document.createElement("div");
  div.className="level-box";
  div.innerHTML=`Level ${lvl}<br>
  <input type="number" id="lvl${lvl}" placeholder="0">`;
  container.appendChild(div);
}

function calculate(){
  let totalPower=0;
  let totalGold=0;

  for (let lvl=1; lvl<=10; lvl++){
    let val=document.getElementById("lvl"+lvl).value;
    let count = val==="" ? 0 : parseInt(val);

    if(isNaN(count) || count<0){
      document.getElementById("result").innerHTML="⚠️ oops tekrar deneyin";
      return;
    }

    let power=0;
    let gold=0;

    for(let i=lvl;i<=10;i++){
      power+=powerPoints[i]||0;
      gold+=goldCost[i]||0;
    }

    totalPower+=power*count;
    totalGold+=gold*count;
  }

  document.getElementById("result").innerHTML=
  `⚡ Güç Puanı: ${totalPower}<br>💰 Altın: ${totalGold}`;
}

function calcGem(){
  let r = document.getElementById("rare").value || 0;
  let sr = document.getElementById("superrare").value || 0;
  let e = document.getElementById("epic").value || 0;

  r=parseInt(r); sr=parseInt(sr); e=parseInt(e);

  if(isNaN(r)||isNaN(sr)||isNaN(e)){
    document.getElementById("gemResult").innerHTML="⚠️ oops tekrar deneyin";
    return;
  }

  let totalGem = (r*29) + (sr*79) + (e*149);
  let totalPrice = (r*1000) + (sr*2750) + (e*5000);

  document.getElementById("gemResult").innerHTML=
  `💎 Toplam Elmas: ${totalGem}<br>🪙 Mücevher Fiyatı: ${totalPrice}`;
}
</script>

</body>
</html>
