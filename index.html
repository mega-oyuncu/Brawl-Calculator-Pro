<!DOCTYPE html> 
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Calculator Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  height:100%;
  font-family:'Bangers', cursive;
  background: radial-gradient(circle at top, #1da1ff, #0b3d91 70%);
  color:white;
}

.menu {
  position: fixed;
  top: 10px;
  left: 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:10;
}

.menu button {
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg, #ff3b3b, #ff9900);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px #ff9900;
}

.phone {
  width: 100%;
  height: 100vh;
  background: #111;
  padding: 15px;
  position: relative;
  box-sizing: border-box;
}

.phone::before {
  content:"";
  width:100px;
  height:20px;
  background:#000;
  border-radius:20px;
  position:absolute;
  top:5px;
  left:50%;
  transform:translateX(-50%);
}

.screen {
  margin-top:25px;
  height: calc(100vh - 40px);
  display:flex;
  flex-direction:column;
}

.page h2 {
  position:absolute;
  top:10px;
  right:15px;
  text-shadow:0 0 10px #00c3ff;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:20px;
  flex:1;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 20px #000 inset, 0 0 10px #00c3ff;
  margin-top:30px;
}

.level-grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  flex:1;
}

.level-box {
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 8px #000;
}

input {
  width:90%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#ffcc00;
  text-align:center;
  font-family:'Bangers';
  transition: all 0.2s ease;
  position:relative;
  z-index:1;
}

/* 🔥 FIXED GLOW (ARTIK YAZIYI KAPATMAZ) */
input:focus {
  outline:none;
  box-shadow:0 0 10px rgba(0,195,255,0.8);
}

/* 🔥 AYIRICI ÇERÇEVE */
.divider {
  border: 2px solid rgba(0,195,255,0.4);
  border-radius:12px;
  margin:10px 0;
}

.result {
  margin-top:10px;
  background:#000;
  padding:10px;
  border-radius:10px;
  border:2px solid gold;
}

.or-text{
  color:#00c3ff;
  text-shadow:0 0 10px #00c3ff;
}

.page { display:none; }
.active { display:block; }
</style>
</head>

<body>

<div class="menu">
  <button onclick="showPage('upgrade')">Kaynak Hesaplayıcı</button>
  <button onclick="showPage('gem')">Kozmetik Fiyatı Hesaplayıcı</button>
</div>

<div class="phone">
  <div class="screen">

    <div id="upgrade" class="page active">
      <h2>Yükseltme</h2>
      <div class="card">

        <div class="level-box">Buffie <input type="number" id="buffie"></div>
        <div class="level-box">Hiperşarj <input type="number" id="hyper_upgrade"></div>

        <div class="level-box">Yıldız Gücü <input type="number" id="star"></div>
        <div class="level-box">Aksesuar <input type="number" id="accessory"></div>

        <div class="level-grid">
          <div class="level-box">Sıradan Eşya <input type="number" id="normalItem"></div>
          <div class="level-box">Destansı Eşya <input type="number" id="epicItem"></div>
        </div>

        <!-- 🔥 YENİ AYIRICI -->
        <div class="divider"></div>

        <div class="level-grid" id="levels"></div>

        <div class="result" id="result">Sonuç burada</div>
      </div>
    </div>

    <div id="gem" class="page">
      <h2>Kozmetikler</h2>
      <div class="card">

        <div class="level-box">Ender <input type="number" id="rare"></div>
        <div class="level-box">Süper Ender <input type="number" id="superrare"></div>
        <div class="level-box">Destansı <input type="number" id="epic"></div>

        <div class="level-box">Gizemli <input type="number" id="mystic"></div>
        <div class="level-box">Efsanevi <input type="number" id="legendary"></div>
        <div class="level-box">Hiperşarj <input type="number" id="hyper"></div>

        <div class="result" id="gemResult">Sonuç burada</div>

      </div>
    </div>

  </div>
</div>

<script>
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

const powerPoints = {
  1:20,2:30,3:50,4:80,5:130,
  6:210,7:340,8:550,9:890,10:1440
};

const goldCost = {
  1:20,2:35,3:75,4:140,5:290,
  6:480,7:800,8:1250,9:1875,10:2800
};

let container = document.getElementById("levels");

for (let lvl=1; lvl<=10; lvl++){
  let div=document.createElement("div");
  div.className="level-box";
  div.innerHTML=`Level ${lvl}<br>
  <input type="number" id="lvl${lvl}" placeholder="0">`;
  container.appendChild(div);
}

document.addEventListener("input", ()=>{
  calculate();
  calcGem();
});

function calculate(){
  let totalPower=0;
  let totalGold=0;

  let buffie = +document.getElementById("buffie").value || 0;
  let hyperU = +document.getElementById("hyper_upgrade").value || 0;
  let star = +document.getElementById("star").value || 0;
  let acc = +document.getElementById("accessory").value || 0;
  let normalItem = +document.getElementById("normalItem").value || 0;
  let epicItem = +document.getElementById("epicItem").value || 0;

  totalPower += buffie * 2000;
  totalGold += buffie * 1000;
  totalGold += hyperU * 5000;
  totalGold += star * 2000;
  totalGold += acc * 1000;
  totalGold += normalItem * 1000;
  totalGold += epicItem * 1500;

  for (let lvl=1; lvl<=10; lvl++){
    let val=document.getElementById("lvl"+lvl).value;
    let count = val==="" ? 0 : parseInt(val);

    if(isNaN(count) || count<0){
      document.getElementById("result").innerHTML="⚠️ oops tekrar deneyin";
      return;
    }

    let power=0;
    let gold=0;

    for(let i=lvl;i<=10;i++){
      power+=powerPoints[i]||0;
      gold+=goldCost[i]||0;
    }

    totalPower+=power*count;
    totalGold+=gold*count;
  }

  document.getElementById("result").innerHTML=
  `⚡ Güç Puanı: ${totalPower}<br>💰 Altın: ${totalGold}`;
}

function calcGem(){
  let r = +document.getElementById("rare").value || 0;
  let sr = +document.getElementById("superrare").value || 0;
  let e = +document.getElementById("epic").value || 0;
  let m = +document.getElementById("mystic").value || 0;
  let l = +document.getElementById("legendary").value || 0;
  let h = +document.getElementById("hyper").value || 0;

  let totalGem = (r*29)+(sr*79)+(e*149)+(m*199)+(l*299)+(h*499);
  let totalPrice = (r*1000)+(sr*2750)+(e*5000);

  let hasNormal = (r>0 || sr>0 || e>0);

  let priceText = hasNormal
    ? `💎 Elmas Fiyatı: ${totalGem}<br><span class="or-text">veya</span><br>🪙 Mücevher Fiyatı: ${totalPrice}`
    : `💎 Elmas Fiyatı: ${totalGem}<br><span class="or-text">veya</span><br>🪙 Mücevher seçeneği yok`;

  document.getElementById("gemResult").innerHTML = priceText;
}
</script>

</body>
</html>
